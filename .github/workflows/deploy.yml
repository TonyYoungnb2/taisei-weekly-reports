name: Weekly Report — Auto Generate & Deploy

on:
  # 每周二 09:00 日本时间自动运行
  schedule:
    - cron: '0 0 * * 2'   # UTC 0:00 = JST 9:00 every Tuesday
      # NOTE: GitHub Actions cron is in UTC. 09:00 JST = 00:00 UTC
  # 手动触发（任何人可以在 GitHub Actions 页面点击 "Run workflow"）
  workflow_dispatch:
  # 有人推送 main 分支时也运行（本地数据更新后）
  push:
    branches: [main]
    paths:
      - 'data/weekly_data.json'
      - 'data/weekly_data_sample.json'
      - 'generate_weekly.py'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate weekly report
        run: python generate_weekly.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          CHANGES=$(git diff --staged --stat)
          if [ -n "$CHANGES" ]; then
            echo "Changes detected, committing..."
            git commit -m "auto: weekly report update $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "PUSHED=true" >> $GITHUB_ENV
          else
            echo "No changes — skipping push"
            echo "PUSHED=false" >> $GITHUB_ENV
          fi

      - name: Notify deployment
        if: env.PUSHED == 'true'
        run: |
          echo "Report updated & pushed to GitHub!"
          echo "EdgeOne Pages will auto-deploy within ~1-2 minutes."
          echo "Live URL: https://github.com/${{ github.repository }}/actions"
